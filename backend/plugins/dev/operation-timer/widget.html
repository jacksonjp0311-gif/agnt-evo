<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: transparent; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
  .tw { display: flex; flex-direction: column; gap: 0; padding: 8px; width: 100%; min-width: 0; }
  .tw-header { display: flex; align-items: center; gap: 8px; padding: 6px 8px 8px; border-bottom: 1px solid rgba(127,129,147,0.1); }
  .tw-header-dot { width: 6px; height: 6px; border-radius: 50%; background: #12e0ff; flex-shrink: 0; animation: tw-pulse 2s ease-in-out infinite; }
  .tw-header-title { font-size: 0.7em; font-weight: 600; color: #7f7fa7; text-transform: uppercase; letter-spacing: 0.08em; }
  .tw-header-count { font-size: 0.65em; color: #4a4a6a; margin-left: auto; font-family: 'JetBrains Mono', monospace; }
  .tw-controls { display: flex; gap: 6px; padding: 8px; flex-wrap: wrap; }
  .tw-btn { padding: 5px 14px; border: none; border-radius: 6px; font-size: 0.72em; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
  .tw-btn-primary { background: linear-gradient(135deg, #e53d8f, #c02a72); color: white; }
  .tw-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(229,61,143,0.3); }
  .tw-btn-secondary { background: rgba(26,26,46,0.6); color: #888; border: 1px solid rgba(42,42,74,0.6); }
  .tw-btn-secondary:hover { border-color: #12e0ff; color: #e0e0e0; }
  .tw-ops-list { display: flex; flex-direction: column; gap: 0; }
  .tw-op-row { display: flex; align-items: center; gap: 10px; padding: 8px; position: relative; transition: background 0.2s; border-bottom: 1px solid rgba(127,129,147,0.05); }
  .tw-op-row:last-child { border-bottom: none; }
  .tw-op-row.running { background: rgba(18,224,255,0.03); }
  .tw-op-row.done { background: rgba(25,239,131,0.02); }
  .tw-op-row.error { background: rgba(255,68,68,0.06); }
  .tw-gear-wrap { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
  .tw-gear { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .tw-gear-svg { width: 22px; height: 22px; }
  .tw-gear.pending .tw-gear-svg path { fill: #2a2a4a; }
  .tw-gear.pending .tw-gear-hub { fill: #0a0a14; stroke: #2a2a4a; stroke-width: 3; }
  .tw-gear.running .tw-gear-svg path { fill: #12e0ff; }
  .tw-gear.running .tw-gear-hub { fill: #0a0a14; stroke: #12e0ff; stroke-width: 3; }
  .tw-gear.running { animation: tw-spin 1.2s linear infinite; }
  .tw-gear.done .tw-gear-svg path { fill: #19ef83; }
  .tw-gear.done .tw-gear-hub { fill: #0a0a14; stroke: #19ef83; stroke-width: 3; }
  .tw-gear.error .tw-gear-svg path { fill: #ff4444; }
  .tw-gear.error .tw-gear-hub { fill: #0a0a14; stroke: #ff4444; stroke-width: 3; }
  @keyframes tw-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .tw-status-dot { position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid #0a0a14; }
  .tw-status-dot.pending { background: #3a3a5a; }
  .tw-status-dot.running { background: #12e0ff; animation: tw-pulse 1s ease-in-out infinite; }
  .tw-status-dot.done { background: #19ef83; }
  .tw-status-dot.error { background: #ff4444; }
  @keyframes tw-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .tw-op-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .tw-op-name { font-size: 0.8em; font-weight: 500; color: #e0e0e0; display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tw-op-icon { font-size: 0.85em; flex-shrink: 0; }
  .tw-op-row.running .tw-op-icon { color: #12e0ff; }
  .tw-op-row.done .tw-op-icon { color: #19ef83; }
  .tw-op-row.error .tw-op-icon { color: #ff4444; }
  .tw-op-status { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.7em; }
  .tw-status-pending { color: #4a4a6a; }
  .tw-status-running { color: #12e0ff; font-weight: 500; }
  .tw-status-done { color: #19ef83; font-weight: 500; }
  .tw-status-error { color: #ff4444; font-weight: 600; }
  .tw-timer { font-weight: 600; }
  .tw-timer-final { color: #19ef83; }
  .tw-timer-stopped { color: #ff4444; opacity: 0.8; }
  .tw-error-msg { display: flex; align-items: flex-start; gap: 6px; margin-top: 4px; padding: 5px 8px; background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); border-radius: 6px; font-size: 0.7em; color: #ff6b6b; line-height: 1.4; font-family: 'Inter', sans-serif; }
  .tw-error-icon { flex-shrink: 0; font-size: 0.9em; margin-top: 1px; }
  .tw-dur-badge { flex-shrink: 0; padding: 3px 8px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.65em; font-weight: 600; letter-spacing: 0.02em; }
  .tw-dur-badge.pending { background: rgba(58,58,90,0.2); color: #4a4a6a; }
  .tw-dur-badge.running { background: rgba(18,224,255,0.1); border: 1px solid rgba(18,224,255,0.2); color: #12e0ff; }
  .tw-dur-badge.done { background: rgba(25,239,131,0.08); border: 1px solid rgba(25,239,131,0.15); color: #19ef83; }
  .tw-dur-badge.error { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.25); color: #ff4444; }
  .tw-progress-track { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(127,129,147,0.05); overflow: hidden; }
  .tw-progress-fill { height: 100%; transition: width 0.3s ease; border-radius: 0 1px 0 0; }
  .tw-progress-fill.running { background: linear-gradient(90deg, #12e0ff, #7d3de5); animation: tw-glow 1.5s ease-in-out infinite; }
  .tw-progress-fill.done { background: #19ef83; }
  .tw-progress-fill.error { background: #ff4444; }
  @keyframes tw-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
  .tw-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-top: 1px solid rgba(127,129,147,0.08); background: rgba(127,129,147,0.02); margin-top: 4px; }
  .tw-footer-label { font-size: 0.65em; font-weight: 600; color: #7f7fa7; text-transform: uppercase; letter-spacing: 0.08em; }
  .tw-footer-time { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; font-weight: 700; color: #e0e0e0; }
  .tw-footer-time.running { color: #12e0ff; animation: tw-pulse 1.5s ease-in-out infinite; }
  .tw-log { margin-top: 8px; padding: 8px; background: rgba(10,10,20,0.6); border: 1px solid rgba(30,30,58,0.6); border-radius: 8px; max-height: 120px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.65em; line-height: 1.7; }
  .tw-log-entry { color: #555; }
  .tw-log-entry .ts { color: #333; }
  .tw-log-entry.start { color: #12e0ff; }
  .tw-log-entry.success { color: #19ef83; }
  .tw-log-entry.fail { color: #ff4444; }
  .tw-presets { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 8px 8px; }
  .tw-preset-btn { padding: 3px 10px; background: rgba(26,26,46,0.6); border: 1px solid rgba(42,42,74,0.6); border-radius: 12px; color: #888; font-size: 0.65em; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
  .tw-preset-btn:hover { border-color: #e53d8f; color: #e0e0e0; }
  .tw-add-row { display: flex; gap: 6px; padding: 8px; }
  .tw-add-row input { flex: 1; padding: 6px 10px; background: rgba(18,18,31,0.6); border: 1px solid rgba(42,42,74,0.6); border-radius: 6px; color: #e0e0e0; font-family: 'Inter', sans-serif; font-size: 0.75em; outline: none; transition: border-color 0.2s; }
  .tw-add-row input:focus { border-color: #e53d8f; }
  .tw-add-row input::placeholder { color: #444; }
  .tw-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; color: #4a4a6a; gap: 8px; text-align: center; }
  .tw-empty-icon { font-size: 2em; opacity: 0.3; }
  .tw-empty-text { font-size: 0.75em; line-height: 1.5; }
</style>
</head>
<body>
<div class="tw" id="timerWidget">
  <div class="tw-header">
    <span class="tw-header-dot"></span>
    <span class="tw-header-title">Operations</span>
    <span class="tw-header-count" id="opCount">0 steps</span>
  </div>
  <div class="tw-presets">
    <button class="tw-preset-btn" onclick="loadPreset('pipeline')">🔄 Data Pipeline</button>
    <button class="tw-preset-btn" onclick="loadPreset('deploy')">🚀 Deploy</button>
    <button class="tw-preset-btn" onclick="loadPreset('test')">🧪 Tests</button>
    <button class="tw-preset-btn" onclick="loadPreset('research')">🔬 Research</button>
  </div>
  <div class="tw-controls">
    <button class="tw-btn tw-btn-primary" onclick="startAll()">▶ Start All</button>
    <button class="tw-btn tw-btn-secondary" onclick="resetAll()">↺ Reset</button>
    <button class="tw-btn tw-btn-secondary" onclick="toggleAdd()">+ Add</button>
  </div>
  <div class="tw-add-row" id="addRow" style="display:none;">
    <input type="text" id="newOpName" placeholder="Operation name..." onkeydown="if(event.key==='Enter')doAdd()">
    <input type="number" id="newOpDur" placeholder="Sec" style="width:60px;" min="1" max="300" value="3">
    <button class="tw-btn tw-btn-primary" onclick="doAdd()">Add</button>
    <button class="tw-btn tw-btn-secondary" onclick="document.getElementById('addRow').style.display='none'">✕</button>
  </div>
  <div class="tw-ops-list" id="opsList">
    <div class="tw-empty" id="emptyState">
      <div class="tw-empty-icon">⚙️</div>
      <div class="tw-empty-text">Pick a preset or add operations to begin</div>
    </div>
  </div>
  <div class="tw-footer" id="footer" style="display:none;">
    <span class="tw-footer-label">Total Time</span>
    <span class="tw-footer-time" id="totalTime">0.0s</span>
  </div>
  <div class="tw-log" id="logArea" style="display:none;"></div>
</div>
<script>
const GEAR='<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="tw-gear-svg"><path d="M50 10 L54 25 L60 12 L58 28 L67 18 L62 32 L73 25 L65 37 L78 33 L68 42 L82 42 L70 48 L85 50 L70 52 L82 58 L68 58 L78 67 L65 63 L73 75 L62 68 L67 82 L58 72 L60 88 L54 75 L50 90 L46 75 L40 88 L42 72 L33 82 L38 68 L27 75 L35 63 L22 67 L32 58 L18 58 L30 52 L15 50 L30 48 L18 42 L32 42 L22 33 L35 37 L27 25 L38 32 L33 18 L42 28 L40 12 L46 25 Z"/><circle cx="50" cy="50" r="15" class="tw-gear-hub"/></svg>';
const presets={pipeline:[{name:'Extract Data',duration:3},{name:'Transform Schema',duration:5},{name:'Validate Types',duration:2},{name:'Load to Warehouse',duration:4},{name:'Run Aggregations',duration:3}],deploy:[{name:'Build Docker Image',duration:6},{name:'Push to Registry',duration:3},{name:'Provision Infrastructure',duration:5},{name:'Deploy Services',duration:4},{name:'Health Check',duration:2},{name:'Update DNS',duration:1}],test:[{name:'Unit Tests',duration:4},{name:'Integration Tests',duration:6},{name:'E2E Tests',duration:8},{name:'Coverage Report',duration:2}],research:[{name:'Search Sources',duration:4},{name:'Fetch Content',duration:5},{name:'Analyze Data',duration:6},{name:'Synthesize Findings',duration:4},{name:'Generate Report',duration:3}]};
let ops=[],totalStart=null,totalInt=null,running=0,opId=0;
function fmt(s){if(s<0)return'0.0s';if(s<60)return s.toFixed(1)+'s';const m=Math.floor(s/60),sec=s%60;return sec===0?m+'m':m+'m '+sec.toFixed(0)+'s';}
function icon(o){return o.status==='error'?'✗':o.status==='done'?'✓':o.status==='running'?'⚙':'○';}
function statTxt(o){if(o.status==='pending')return'<span class="tw-status-pending">Waiting...</span>';if(o.status==='done')return'<span class="tw-status-done">Ran</span> <span class="tw-timer tw-timer-final">'+fmt(o.elapsed)+'</span>';if(o.status==='error')return'<span class="tw-status-error">Error</span> <span class="tw-timer tw-timer-stopped">@ '+fmt(o.errorTime)+'</span>';return'<span class="tw-status-running">Running</span> <span class="tw-timer">'+fmt(o.elapsed)+'</span>';}
function durTxt(o){return o.status==='running'||o.status==='done'?fmt(o.elapsed):o.status==='error'?'STOPPED':'--';}
function prog(o){return o.status==='done'||o.status==='error'?100:o.status==='pending'?0:o.duration?Math.min((o.elapsed/o.duration)*100,99):0;}
function render(){const list=document.getElementById('opsList'),empty=document.getElementById('emptyState'),footer=document.getElementById('footer'),count=document.getElementById('opCount');count.textContent=ops.length+' step'+(ops.length!==1?'s':'');if(ops.length===0){empty.style.display='flex';footer.style.display='none';list.innerHTML='';list.appendChild(empty)return;}empty.style.display='none';footer.style.display='flex';list.innerHTML=ops.map(o=>'<div class="tw-op-row '+o.status+'" id="row-'+o.id+'"><div class="tw-gear-wrap"><div class="tw-gear '+o.status+'" id="gear-'+o.id+'">'+GEAR+'</div><div class="tw-status-dot '+o.status+'"></div></div><div class="tw-op-info"><div class="tw-op-name"><span class="tw-op-icon">'+icon(o)+'</span>'+o.name+'</div><div class="tw-op-status" id="status-'+o.id+'">'+statTxt(o)+'</div>'+(o.status==='error'&&o.errorMsg?'<div class="tw-error-msg"><span class="tw-error-icon">⚠</span>'+o.errorMsg+'</div>':'')+'</div><div class="tw-dur-badge '+o.status+'" id="dur-'+o.id+'">'+durTxt(o)+'</div><div class="tw-progress-track"><div class="tw-progress-fill '+o.status+'" id="prog-'+o.id+'" style="width:'+prog(o)+'%"></div></div></div>').join('');}
function updateOp(o){const row=document.getElementById('row-'+o.id);if(!row){render();return;}row.className='tw-op-row '+o.status;const g=document.getElementById('gear-'+o.id);if(g){g.className='tw-gear '+o.status;g.innerHTML=GEAR;}const d=row.querySelector('.tw-status-dot');if(d)d.className='tw-status-dot '+o.status;const s=document.getElementById('status-'+o.id);if(s)s.innerHTML=statTxt(o);const db=document.getElementById('dur-'+o.id);if(db){db.textContent=durTxt(o);db.className='tw-dur-badge '+o.status;}const p=document.getElementById('prog-'+o.id);if(p){p.style.width=prog(o)+'%';p.className='tw-progress-fill '+o.status;}const ic=row.querySelector('.tw-op-icon');if(ic)ic.textContent=icon(o);}
function startAll(){if(!totalStart){totalStart=Date.now();totalInt=setInterval(updateTotal,100);}let started=false;ops.forEach(o=>{if(o.status==='pending'){startOp(o);started=true;}});if(!started){ops.forEach(o=>{if(o.status==='done'||o.status==='error'){o.status='pending';o.elapsed=0;o.errorMsg='';o.errorTime=0;}});totalStart=Date.now();totalInt=setInterval(updateTotal,100);ops.forEach(o=>{if(o.status==='pending')startOp(o);});}}
function startOp(o){o.status='running';o.elapsed=0;o.startTime=Date.now();running++;addLog('▶ Started: '+o.name,'start');render();o.interval=setInterval(()=>{o.elapsed=(Date.now()-o.startTime)/1000;updateOp(o);if(o.elapsed>=o.duration)completeOp(o);},50);}
function completeOp(o){clearInterval(o.interval);o.interval=null;o.status='done';o.elapsed=(Date.now()-o.startTime)/1000;running--;addLog('✅ Completed: '+o.name+' in '+fmt(o.elapsed),'success');updateOp(o);if(running===0&&ops.every(x=>x.status==='done')){clearInterval(totalInt);addLog('🏁 All complete! Total: '+fmt((Date.now()-totalStart)/1000),'success');}}
function failOp(o,msg){clearInterval(o.interval);o.interval=null;o.status='error';o.errorMsg=msg||'Unknown error';o.errorTime=(Date.now()-o.startTime)/1000;o.elapsed=o.errorTime;running--;addLog('❌ Failed: '+o.name+' @ '+fmt(o.errorTime)+' — '+o.errorMsg,'fail');updateOp(o);}
function updateTotal(){if(!totalStart)return;const e=(Date.now()-totalStart)/1000;const el=document.getElementById('totalTime');el.textContent=fmt(e);el.className='tw-footer-time'+(running>0?' running':'');}
function resetAll(){ops.forEach(o=>{if(o.interval)clearInterval(o.interval);});ops=[];running=0;totalStart=null;clearInterval(totalInt);totalInt=null;document.getElementById('totalTime').textContent='0.0s';document.getElementById('totalTime').className='tw-footer-time';document.getElementById('logArea').style.display='none';document.getElementById('logArea').innerHTML='';render();}
function loadPreset(name){resetAll();presets[name].forEach(o=>{ops.push({id:++opId,name:o.name,duration:o.duration,elapsed:0,status:'pending',interval:null,errorMsg:'',errorTime:0});});addLog('📋 Loaded: '+name+' ('+presets[name].length+' ops)','start');render();}
function toggleAdd(){const r=document.getElementById('addRow');r.style.display=r.style.display==='none'?'flex':'none';if(r.style.display==='flex')document.getElementById('newOpName').focus();}
function doAdd(){const n=document.getElementById('newOpName').value.trim()||'Operation '+(ops.length+1),d=parseInt(document.getElementById('newOpDur').value)||3;ops.push({id:++opId,name:n,duration:d,elapsed:0,status:'pending',interval:null,errorMsg:'',errorTime:0});document.getElementById('newOpName').value='';document.getElementById('newOpDur').value='3';document.getElementById('addRow').style.display='none';addLog('➕ Added: '+n+' ('+d+'s)','start');render();}
function addLog(msg,type){const area=document.getElementById('logArea');area.style.display='block';const now=new Date(),ts=now.toTimeString().split(' ')[0];const e=document.createElement('div');e.className='tw-log-entry '+type;e.innerHTML='<span class="ts">['+ts+']</span> '+msg;area.appendChild(e);area.scrollTop=area.scrollHeight;}
window.loadPreset=loadPreset;window.startAll=startAll;window.resetAll=resetAll;window.toggleAdd=toggleAdd;window.doAdd=doAdd;
loadPreset('pipeline');
</script>
</body>
</html>
