<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: transparent;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .timer-widget {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 8px;
    width: 100%;
    min-width: 0;
  }

  /* ── Header ── */
  .tw-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px 8px;
    border-bottom: 1px solid rgba(127, 129, 147, 0.1);
  }

  .tw-header-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #12e0ff;
    flex-shrink: 0;
    animation: tw-pulse 2s ease-in-out infinite;
  }

  .tw-header-title {
    font-size: 0.7em;
    font-weight: 600;
    color: #7f7fa7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .tw-header-count {
    font-size: 0.65em;
    color: #4a4a6a;
    margin-left: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }

  /* ── Controls ── */
  .tw-controls {
    display: flex;
    gap: 6px;
    padding: 8px;
    flex-wrap: wrap;
  }

  .tw-btn {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    font-size: 0.72em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .tw-btn-primary {
    background: linear-gradient(135deg, #e53d8f, #c02a72);
    color: white;
  }
  .tw-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(229,61,143,0.3); }

  .tw-btn-secondary {
    background: rgba(26, 26, 46, 0.6);
    color: #888;
    border: 1px solid rgba(42, 42, 74, 0.6);
  }
  .tw-btn-secondary:hover { border-color: #12e0ff; color: #e0e0e0; }

  /* ── Operations list ── */
  .tw-ops-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Operation row ── */
  .tw-op-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    position: relative;
    transition: background 0.2s ease;
    border-bottom: 1px solid rgba(127, 129, 147, 0.05);
  }

  .tw-op-row:last-child {
    border-bottom: none;
  }

  .tw-op-row.running {
    background: rgba(18, 224, 255, 0.03);
  }

  .tw-op-row.done {
    background: rgba(25, 239, 131, 0.02);
  }

  .tw-op-row.error {
    background: rgba(255, 68, 68, 0.06);
  }

  /* ── Gear ── */
  .tw-gear-wrap {
    position: relative;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .tw-gear {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tw-gear-svg {
    width: 22px;
    height: 22px;
  }

  .tw-gear.pending .tw-gear-svg path { fill: #2a2a4a; }
  .tw-gear.pending .tw-gear-hub { fill: #0a0a14; stroke: #2a2a4a; stroke-width: 3; }

  .tw-gear.running .tw-gear-svg path { fill: #12e0ff; }
  .tw-gear.running .tw-gear-hub { fill: #0a0a14; stroke: #12e0ff; stroke-width: 3; }
  .tw-gear.running { animation: tw-spin 1.2s linear infinite; }

  .tw-gear.done .tw-gear-svg path { fill: #19ef83; }
  .tw-gear.done .tw-gear-hub { fill: #0a0a14; stroke: #19ef83; stroke-width: 3; }

  .tw-gear.error .tw-gear-svg path { fill: #ff4444; }
  .tw-gear.error .tw-gear-hub { fill: #0a0a14; stroke: #ff4444; stroke-width: 3; }

  @keyframes tw-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Status dot */
  .tw-status-dot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid #0a0a14;
  }
  .tw-status-dot.pending { background: #3a3a5a; }
  .tw-status-dot.running { background: #12e0ff; animation: tw-pulse 1s ease-in-out infinite; }
  .tw-status-dot.done { background: #19ef83; }
  .tw-status-dot.error { background: #ff4444; }

  @keyframes tw-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Op info ── */
  .tw-op-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tw-op-name {
    font-size: 0.8em;
    font-weight: 500;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tw-op-icon {
    font-size: 0.85em;
    flex-shrink: 0;
  }

  .tw-op-row.running .tw-op-icon { color: #12e0ff; }
  .tw-op-row.done .tw-op-icon { color: #19ef83; }
  .tw-op-row.error .tw-op-icon { color: #ff4444; }

  .tw-op-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.7em;
  }

  .tw-status-pending { color: #4a4a6a; }
  .tw-status-running { color: #12e0ff; font-weight: 500; }
  .tw-status-done { color: #19ef83; font-weight: 500; }
  .tw-status-error { color: #ff4444; font-weight: 600; }

  .tw-timer { font-weight: 600; }
  .tw-timer-final { color: #19ef83; }
  .tw-timer-stopped { color: #ff4444; opacity: 0.8; }

  /* ── Error message ── */
  .tw-error-msg {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-top: 4px;
    padding: 5px 8px;
    background: rgba(255, 68, 68, 0.08);
    border: 1px solid rgba(255, 68, 68, 0.2);
    border-radius: 6px;
    font-size: 0.7em;
    color: #ff6b6b;
    line-height: 1.4;
    font-family: 'Inter', sans-serif;
  }

  .tw-error-icon {
    flex-shrink: 0;
    font-size: 0.9em;
    margin-top: 1px;
  }

  /* ── Duration badge ── */
  .tw-dur-badge {
    flex-shrink: 0;
    padding: 3px 8px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.65em;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .tw-dur-badge.pending {
    background: rgba(58, 58, 90, 0.2);
    color: #4a4a6a;
  }

  .tw-dur-badge.running {
    background: rgba(18, 224, 255, 0.1);
    border: 1px solid rgba(18, 224, 255, 0.2);
    color: #12e0ff;
  }

  .tw-dur-badge.done {
    background: rgba(25, 239, 131, 0.08);
    border: 1px solid rgba(25, 239, 131, 0.15);
    color: #19ef83;
  }

  .tw-dur-badge.error {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid rgba(255, 68, 68, 0.25);
    color: #ff4444;
  }

  /* ── Progress bar ── */
  .tw-progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(127, 129, 147, 0.05);
    overflow: hidden;
  }

  .tw-progress-fill {
    height: 100%;
    transition: width 0.3s ease;
    border-radius: 0 1px 0 0;
  }

  .tw-progress-fill.running {
    background: linear-gradient(90deg, #12e0ff, #7d3de5);
    animation: tw-progress-glow 1.5s ease-in-out infinite;
  }

  .tw-progress-fill.done { background: #19ef83; }
  .tw-progress-fill.error { background: #ff4444; }

  @keyframes tw-progress-glow {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  /* ── Footer ── */
  .tw-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px;
    border-top: 1px solid rgba(127, 129, 147, 0.08);
    background: rgba(127, 129, 147, 0.02);
    margin-top: 4px;
  }

  .tw-footer-label {
    font-size: 0.65em;
    font-weight: 600;
    color: #7f7fa7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .tw-footer-time {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.85em;
    font-weight: 700;
    color: #e0e0e0;
  }

  .tw-footer-time.running {
    color: #12e0ff;
    animation: tw-pulse 1.5s ease-in-out infinite;
  }

  /* ── Log area ── */
  .tw-log {
    margin-top: 8px;
    padding: 8px;
    background: rgba(10, 10, 20, 0.6);
    border: 1px solid rgba(30, 30, 58, 0.6);
    border-radius: 8px;
    max-height: 120px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.65em;
    line-height: 1.7;
  }

  .tw-log-entry { color: #555; }
  .tw-log-entry .ts { color: #333; }
  .tw-log-entry.start { color: #12e0ff; }
  .tw-log-entry.success { color: #19ef83; }
  .tw-log-entry.fail { color: #ff4444; }

  /* ── Presets ── */
  .tw-presets {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    padding: 0 8px 8px;
  }

  .tw-preset-btn {
    padding: 3px 10px;
    background: rgba(26, 26, 46, 0.6);
    border: 1px solid rgba(42, 42, 74, 0.6);
    border-radius: 12px;
    color: #888;
    font-size: 0.65em;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .tw-preset-btn:hover {
    border-color: #e53d8f;
    color: #e0e0e0;
  }

  /* ── Add operation ── */
  .tw-add-row {
    display: flex;
    gap: 6px;
    padding: 8px;
  }

  .tw-add-row input {
    flex: 1;
    padding: 6px 10px;
    background: rgba(18, 18, 31, 0.6);
    border: 1px solid rgba(42, 42, 74, 0.6);
    border-radius: 6px;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 0.75em;
    outline: none;
    transition: border-color 0.2s;
  }

  .tw-add-row input:focus { border-color: #e53d8f; }
  .tw-add-row input::placeholder { color: #444; }

  /* ── Empty state ── */
  .tw-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    color: #4a4a6a;
    gap: 8px;
    text-align: center;
  }

  .tw-empty-icon {
    font-size: 2em;
    opacity: 0.3;
  }

  .tw-empty-text {
    font-size: 0.75em;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="timer-widget" id="timerWidget">
  <div class="tw-header">
    <span class="tw-header-dot"></span>
    <span class="tw-header-title">Operations</span>
    <span class="tw-header-count" id="opCount">0 steps</span>
  </div>

  <div class="tw-presets">
    <button class="tw-preset-btn" onclick="loadPreset('pipeline')">🔄 Data Pipeline</button>
    <button class="tw-preset-btn" onclick="loadPreset('deploy')">🚀 Deploy</button>
    <button class="tw-preset-btn" onclick="loadPreset('test')">🧪 Tests</button>
    <button class="tw-preset-btn" onclick="loadPreset('research')">🔬 Research</button>
  </div>

  <div class="tw-controls">
    <button class="tw-btn tw-btn-primary" id="startAll" onclick="startAll()">▶ Start All</button>
    <button class="tw-btn tw-btn-secondary" onclick="resetAll()">↺ Reset</button>
    <button class="tw-btn tw-btn-secondary" onclick="addCustomOp()">+ Add</button>
  </div>

  <div class="tw-add-row" id="addRow" style="display:none;">
    <input type="text" id="newOpName" placeholder="Operation name..." onkeydown="if(event.key==='Enter')addCustomOp()">
    <input type="number" id="newOpDur" placeholder="Sec" style="width:60px;" min="1" max="300" value="3">
    <button class="tw-btn tw-btn-primary" onclick="addCustomOp()">Add</button>
    <button class="tw-btn tw-btn-secondary" onclick="document.getElementById('addRow').style.display='none'">✕</button>
  </div>

  <div class="tw-ops-list" id="opsList">
    <div class="tw-empty" id="emptyState">
      <div class="tw-empty-icon">⚙️</div>
      <div class="tw-empty-text">Pick a preset or add operations to begin</div>
    </div>
  </div>

  <div class="tw-footer" id="footer" style="display:none;">
    <span class="tw-footer-label">Total Time</span>
    <span class="tw-footer-time" id="totalTime">0.0s</span>
  </div>

  <div class="tw-log" id="logArea" style="display:none;"></div>
</div>

<script>
const GEAR_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="tw-gear-svg">
  <path d="M50 10 L54 25 L60 12 L58 28 L67 18 L62 32 L73 25 L65 37 L78 33 L68 42 L82 42 L70 48 L85 50 L70 52 L82 58 L68 58 L78 67 L65 63 L73 75 L62 68 L67 82 L58 72 L60 88 L54 75 L50 90 L46 75 L40 88 L42 72 L33 82 L38 68 L27 75 L35 63 L22 67 L32 58 L18 58 L30 52 L15 50 L30 48 L18 42 L32 42 L22 33 L35 37 L27 25 L38 32 L33 18 L42 28 L40 12 L46 25 Z"/>
  <circle cx="50" cy="50" r="15" class="tw-gear-hub"/>
</svg>`;

const presets = {
  pipeline: [
    { name: 'Extract Data', duration: 3 },
    { name: 'Transform Schema', duration: 5 },
    { name: 'Validate Types', duration: 2 },
    { name: 'Load to Warehouse', duration: 4 },
    { name: 'Run Aggregations', duration: 3 },
  ],
  deploy: [
    { name: 'Build Docker Image', duration: 6 },
    { name: 'Push to Registry', duration: 3 },
    { name: 'Provision Infrastructure', duration: 5 },
    { name: 'Deploy Services', duration: 4 },
    { name: 'Health Check', duration: 2 },
    { name: 'Update DNS', duration: 1 },
  ],
  test: [
    { name: 'Unit Tests', duration: 4 },
    { name: 'Integration Tests', duration: 6 },
    { name: 'E2E Tests', duration: 8 },
    { name: 'Coverage Report', duration: 2 },
  ],
  research: [
    { name: 'Search Sources', duration: 4 },
    { name: 'Fetch Content', duration: 5 },
    { name: 'Analyze Data', duration: 6 },
    { name: 'Synthesize Findings', duration: 4 },
    { name: 'Generate Report', duration: 3 },
  ]
};

let operations = [];
let totalStartTime = null;
let totalInterval = null;
let runningCount = 0;
let opIdCounter = 0;

function formatTime(seconds) {
  if (seconds < 0) return '0.0s';
  if (seconds < 60) return seconds.toFixed(1) + 's';
  const mins = Math.floor(seconds / 60);
  const secs = (seconds % 60);
  if (secs === 0) return mins + 'm';
  return mins + 'm ' + secs.toFixed(0) + 's';
}

function getOpIcon(op) {
  if (op.status === 'error') return '✗';
  if (op.status === 'done') return '✓';
  if (op.status === 'running') return '⚙';
  return '○';
}

function getStatusText(op) {
  if (op.status === 'pending') return '<span class="tw-status-pending">Waiting...</span>';
  if (op.status === 'done') return '<span class="tw-status-done">Ran</span> <span class="tw-timer tw-timer-final">' + formatTime(op.elapsed) + '</span>';
  if (op.status === 'error') return '<span class="tw-status-error">Error</span> <span class="tw-timer tw-timer-stopped">@ ' + formatTime(op.errorTime) + '</span>';
  return '<span class="tw-status-running">Running</span> <span class="tw-timer">' + formatTime(op.elapsed) + '</span>';
}

function getDurText(op) {
  if (op.status === 'running') return formatTime(op.elapsed);
  if (op.status === 'done') return formatTime(op.elapsed);
  if (op.status === 'error') return 'STOPPED';
  return '--';
}

function getProgress(op) {
  if (op.status === 'done' || op.status === 'error') return 100;
  if (op.status === 'pending') return 0;
  if (op.duration) return Math.min((op.elapsed / op.duration) * 100, 99);
  return 0;
}

function render() {
  const list = document.getElementById('opsList');
  const empty = document.getElementById('emptyState');
  const footer = document.getElementById('footer');
  const count = document.getElementById('opCount');

  count.textContent = operations.length + ' step' + (operations.length !== 1 ? 's' : '');

  if (operations.length === 0) {
    empty.style.display = 'flex';
    footer.style.display = 'none';
    list.innerHTML = '';
    list.appendChild(empty);
    return;
  }

  empty.style.display = 'none';
  footer.style.display = 'flex';

  list.innerHTML = operations.map((op, i) => `
    <div class="tw-op-row ${op.status}" id="row-${op.id}">
      <div class="tw-gear-wrap">
        <div class="tw-gear ${op.status}" id="gear-${op.id}">
          ${GEAR_SVG}
        </div>
        <div class="tw-status-dot ${op.status}"></div>
      </div>
      <div class="tw-op-info">
        <div class="tw-op-name">
          <span class="tw-op-icon">${getOpIcon(op)}</span>
          ${op.name}
        </div>
        <div class="tw-op-status" id="status-${op.id}">${getStatusText(op)}</div>
        ${op.status === 'error' && op.errorMsg ? `
          <div class="tw-error-msg">
            <span class="tw-error-icon">⚠</span>
            ${op.errorMsg}
          </div>
        ` : ''}
      </div>
      <div class="tw-dur-badge ${op.status}" id="dur-${op.id}">${getDurText(op)}</div>
      <div class="tw-progress-track">
        <div class="tw-progress-fill ${op.status}" id="prog-${op.id}" style="width:${getProgress(op)}%"></div>
      </div>
    </div>
  `).join('');
}

function updateOp(op) {
  const row = document.getElementById(`row-${op.id}`);
  if (!row) {
    render();
    return;
  }

  row.className = `tw-op-row ${op.status}`;

  const gear = document.getElementById(`gear-${op.id}`);
  if (gear) {
    gear.className = `tw-gear ${op.status}`;
    gear.innerHTML = GEAR_SVG;
  }

  const dot = row.querySelector('.tw-status-dot');
  if (dot) dot.className = `tw-status-dot ${op.status}`;

  const status = document.getElementById(`status-${op.id}`);
  if (status) status.innerHTML = getStatusText(op);

  const dur = document.getElementById(`dur-${op.id}`);
  if (dur) {
    dur.textContent = getDurText(op);
    dur.className = `tw-dur-badge ${op.status}`;
  }

  const prog = document.getElementById(`prog-${op.id}`);
  if (prog) {
    prog.style.width = getProgress(op) + '%';
    prog.className = `tw-progress-fill ${op.status}`;
  }

  const icon = row.querySelector('.tw-op-icon');
  if (icon) icon.textContent = getOpIcon(op);
}

function startAll() {
  if (!totalStartTime) {
    totalStartTime = Date.now();
    totalInterval = setInterval(updateTotal, 100);
  }

  let started = false;
  operations.forEach(op => {
    if (op.status === 'pending') {
      startOp(op);
      started = true;
    }
  });

  if (!started) {
    // All done — restart completed ones
    operations.forEach(op => {
      if (op.status === 'done' || op.status === 'error') {
        op.status = 'pending';
        op.elapsed = 0;
        op.errorMsg = '';
        op.errorTime = 0;
      }
    });
    totalStartTime = Date.now();
    totalInterval = setInterval(updateTotal, 100);
    operations.forEach(op => {
      if (op.status === 'pending') startOp(op);
    });
  }
}

function startOp(op) {
  op.status = 'running';
  op.elapsed = 0;
  op.startTime = Date.now();
  runningCount++;
  addLog('▶ Started: ' + op.name, 'start');
  render();

  op.interval = setInterval(() => {
    op.elapsed = (Date.now() - op.startTime) / 1000;
    updateOp(op);

    if (op.elapsed >= op.duration) {
      completeOp(op);
    }
  }, 50);
}

function completeOp(op) {
  clearInterval(op.interval);
  op.interval = null;
  op.status = 'done';
  op.elapsed = (Date.now() - op.startTime) / 1000;
  runningCount--;
  addLog('✅ Completed: ' + op.name + ' in ' + formatTime(op.elapsed), 'success');
  updateOp(op);

  if (runningCount === 0 && operations.every(o => o.status === 'done')) {
    clearInterval(totalInterval);
    addLog('🏁 All operations complete! Total: ' + formatTime((Date.now() - totalStartTime) / 1000), 'success');
  }
}

function failOp(op, msg) {
  clearInterval(op.interval);
  op.interval = null;
  op.status = 'error';
  op.errorMsg = msg || 'Unknown error';
  op.errorTime = (Date.now() - op.startTime) / 1000;
  op.elapsed = op.errorTime;
  runningCount--;
  addLog('❌ Failed: ' + op.name + ' @ ' + formatTime(op.errorTime) + ' — ' + op.errorMsg, 'fail');
  updateOp(op);
}

function updateTotal() {
  if (!totalStartTime) return;
  const elapsed = (Date.now() - totalStartTime) / 1000;
  const el = document.getElementById('totalTime');
  el.textContent = formatTime(elapsed);
  el.className = 'tw-footer-time' + (runningCount > 0 ? ' running' : '');
}

function resetAll() {
  operations.forEach(op => {
    if (op.interval) clearInterval(op.interval);
  });
  operations = [];
  runningCount = 0;
  totalStartTime = null;
  clearInterval(totalInterval);
  totalInterval = null;
  document.getElementById('totalTime').textContent = '0.0s';
  document.getElementById('totalTime').className = 'tw-footer-time';
  document.getElementById('logArea').style.display = 'none';
  document.getElementById('logArea').innerHTML = '';
  render();
}

function loadPreset(name) {
  resetAll();
  presets[name].forEach(op => {
    operations.push({
      id: ++opIdCounter,
      name: op.name,
      duration: op.duration,
      elapsed: 0,
      status: 'pending',
      interval: null,
      errorMsg: '',
      errorTime: 0,
    });
  });
  addLog('📋 Loaded preset: 'name' (' + presets[name].length + ' operations)', 'start');
  render();
}

function addCustomOp() {
  const nameInput = document.getElementById('newOpName');
  const durInput = document.getElementById('newOpDur');
  const name = nameInput.value.trim() || 'Operation ' + (operations.length + 1);
  const duration = parseInt(durInput.value) || 3;

  operations.push({
    id: ++opIdCounter,
    name: name,
    duration: duration,
    elapsed: 0,
    status: 'pending',
    interval: null,
    errorMsg: '',
    errorTime: 0,
  });

  nameInput.value = '';
  durInput.value = '3';
  document.getElementById('addRow').style.display = 'none';
  addLog('➕ Added: ' + name + ' (' + duration + 's)', 'start');
  render();
}

function addLog(msg, type) {
  const area = document.getElementById('logArea');
  area.style.display = 'block';
  const now = new Date();
  const ts = now.toTimeString().split(' ')[0];
  const entry = document.createElement('div');
  entry.className = 'tw-log-entry ' + type;
  entry.innerHTML = '<span class="ts">[' + ts + ']</span> ' + msg;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
}

// Expose for button onclick
window.loadPreset = loadPreset;
window.startAll = startAll;
window.resetAll = resetAll;
window.addCustomOp = function() {
  const addRow = document.getElementById('addRow');
  if (addRow.style.display === 'none') {
    addRow.style.display = 'flex';
    document.getElementById('newOpName').focus();
  } else {
    const nameInput = document.getElementById('newOpName');
    const durInput = document.getElementById('newOpDur');
    const name = nameInput.value.trim() || 'Operation ' + (operations.length + 1);
    const duration = parseInt(durInput.value) || 3;
    operations.push({
      id: ++opIdCounter, name, duration, elapsed: 0, status: 'pending',
      interval: null, errorMsg: '', errorTime: 0,
    });
    nameInput.value = '';
    durInput.value = '3';
    addRow.style.display = 'none';
    addLog('➕ Added: ' + name + ' (' + duration + 's)', 'start');
    render();
  }
};

// Initialize with pipeline preset
loadPreset('pipeline');
</script>
